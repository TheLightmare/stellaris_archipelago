 # =========================================================================
 # Check category descriptions (milestone notifications)
 # =========================================================================
 ap_check.100.desc.survey:0 "Our survey fleets have mapped enough of the galaxy to transmit valuable §Ystellar cartography data§! through the Archipelago Network.\n\n§GSomewhere across the multiverse, another civilization just received the fruits of our exploration.§!"
 ap_check.100.desc.exploration:0 "A significant §Yexploration milestone§! has been transmitted through the Archipelago Network. Our discoveries at the frontier of known space benefit civilizations in other realities.\n\n§GThe multiverse grows richer with each discovery.§!"
 ap_check.100.desc.tech:0 "Our §Yscientific progress§! has been transmitted through the Archipelago Network. Another civilization in a distant reality benefits from our research breakthroughs.\n\n§GKnowledge shared is knowledge multiplied.§!"
 ap_check.100.desc.economy:0 "Our §Yeconomic achievements§! have been transmitted through the Archipelago Network. The prosperity of our empire resonates across dimensional boundaries.\n\n§GOur economic engine powers the multiverse.§!"
 ap_check.100.desc.expansion:0 "Our §Ycolonial expansion§! has been transmitted through the Archipelago Network. Each new world we settle sends ripples through the multiverse.\n\n§GThe empire grows, and so does our contribution.§!"
 ap_check.100.desc.military:0 "Our §Ymilitary prowess§! has been transmitted through the Archipelago Network. Our victories on the battlefield empower allies in other realities.\n\n§GStrength through the multiverse.§!"
 ap_check.100.desc.diplomacy:0 "A §Ydiplomatic achievement§! has been transmitted through the Archipelago Network. Our progress in galactic politics benefits civilizations beyond our reality.\n\n§GDiplomacy transcends dimensions.§!"
 ap_check.100.desc.traditions:0 "Our §Ycultural traditions§! have been transmitted through the Archipelago Network. The depth of our civilization's heritage inspires others across the multiverse.\n\n§GOur traditions echo through the cosmos.§!"
 ap_check.100.desc.crisis:0 "Our experience with the §Yendgame crisis§! has been transmitted through the Archipelago Network. Survival data from our reality may prove invaluable to others.\n\n§GWe endure - and so shall the multiverse.§!"
 ap_check.100.desc.victory:0 "§GVICTORY!§! Our civilization has achieved its ultimate goal. This triumph has been transmitted through the Archipelago Network.\n\n§YThe multiverse celebrates our success!§!"
